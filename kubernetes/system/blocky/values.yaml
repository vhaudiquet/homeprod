replicaCount: 1
image:
    repository: ghcr.io/0xerr0r/blocky
    tag: v0.24
    pullPolicy: IfNotPresent
service:
    type: LoadBalancer
    annotations:
        io.cilium/lb-ipam-ips: 10.1.2.172
    ports:
        dns:
            port: 53
            protocol: UDP
        dns-tcp:
            port: 53
            protocol: TCP
resources:
    limits:
        cpu: 200m
        memory: 256Mi
    requests:
        cpu: 50m
        memory: 64Mi
config:
    upstream:
        default:
            - 1.1.1.1
            - 1.0.0.1
        # Conditional forwarding for .lan zone to CoreDNS
        lan:
            - coredns.coredns.svc.cluster.local
    conditional:
        mapping:
            lan: coredns.coredns.svc.cluster.local
    blocking:
        # Whitelist - domains that should never be blocked
        whiteLists:
            ads:
                - dealabs.digidip.net
                - s.click.aliexpress.com
                - fonts.googleapis.com
                - fonts.gstatic.com
                - wl.spotify.com
                - www.googleadservices.com
        # Blocklists
        blackLists:
            ads:
                - https://big.oisd.nl/
                - https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts
                - https://adaway.org/hosts.txt
        # Block all query types for blocked domains
        blockType: any
        # Refresh blocklists every 4 hours
        refreshPeriod: 4h
        # Download timeout for blocklists
        downloadTimeout: 60s
    # DNS caching
    caching:
        minTime: 5m
        maxTime: 30m
        prefetching: true
        prefetchExpires: 2h
        prefetchThreshold: 5
    # Prometheus metrics
    prometheus:
        enabled: true
        path: /metrics
    # Logging
    log:
        level: info
        format: text
        timestamp: true
    # HTTP API for web UI and API
    http:
        address: 0.0.0.0:4000
