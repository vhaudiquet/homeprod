apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: caddy
  namespace: caddy
spec:
  interval: 1m
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        name: caddy
        namespace: caddy
      chart: caddy
      interval: 1m
      version: "0.7.1"
  valuesFrom:
    - kind: Secret
      name: caddy-values
