apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: caddy
resources:
  - namespace.yaml
  - repository.yaml
  - release.yaml
  - certificates-secret.yaml
  - caddyfile.yaml
secretGenerator:
  - name: caddy-values
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml
