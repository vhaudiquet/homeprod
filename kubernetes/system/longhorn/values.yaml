# Longhorn Helm Values
# Single-node R740 cluster, backup target on TrueNAS NFS
defaultSettings:
    # Single node — only 1 replica needed
    defaultReplicaCount: 1
    # NFS backup target on TrueNAS
    backupTarget: nfs://truenas.lan:/mnt/fast_app_data/longhorn-backup
    # Allow full disk usage on single-node
    storageOverProvisioningPercentage: 100
    storageMinimalAvailablePercentage: 10
    # Auto-salvage on node reboot (single-node)
    autoSalvage: true
    # Disable strict flushing for better single-node performance
    strictSyncReplicas: false
persistence:
    defaultClass: true
    defaultClassReplicaCount: 1
    # Retain volumes on PVC delete — safer during migration
    reclaimPolicy: Retain
    # Mount options for ext4
    fstype: ext4
longhorn-ui:
    replicas: 1
longhorn-manager:
    tolerations:
        - key: ENC[AES256_GCM,data:HXcRGwnZkabc9hqnCNMYN05JYriiMQx7A7qTWXFvSvrHrBNP/A==,iv:obaOkaDCXPf1krWzs2XX3K2tKNQmDIAjCI7axto4q4o=,tag:2PQeZIy6E4UyEyDGjqqmpg==,type:str]
          operator: Exists
          effect: NoSchedule
longhorn-driver-deployer:
    tolerations:
        - key: ENC[AES256_GCM,data:NOHqzVl7VyrhnoS7UzdYuFDRReXnfb7gZKyEHwJkYJtVUbaZaA==,iv:P9v9AV2mKt6uPiKUU/2RW8Ncpefn9fbz1bmcVgUg2zQ=,tag:Qfy2EpKVyKWGlK/OgkY4Hw==,type:str]
          operator: Exists
          effect: NoSchedule
# Disable ingress for now
ingress:
    enabled: false
# Recurring backup and snapshot schedules
# - Daily snapshots: fast local recovery from accidental deletes
# - Daily NFS backups: DR if node is lost
recurringJobs:
    enable: true
    jobs:
        - name: daily-snapshot
          task: snapshot
          cron: 0 2 * * *
          retain: 7
          concurrency: 2
          labels:
            type: snapshot
        - name: daily-backup
          task: backup
          cron: 0 3 * * *
          retain: 7
          concurrency: 2
          labels:
            type: backup
