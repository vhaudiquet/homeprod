apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 1m
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      chart: longhorn
      version: '1.12.0'
      interval: 1m
  valuesFrom:
    - kind: Secret
      name: longhorn-values
