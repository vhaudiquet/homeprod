apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: coredns
resources:
  - namespace.yaml
  - repository.yaml
  - release.yaml
  - zone-configmap.yaml
  - etcd.yaml
secretGenerator:
  - name: coredns-values
    files:
      - values.yaml=values.yaml
configurations:
  - kustomizeconfig.yaml
