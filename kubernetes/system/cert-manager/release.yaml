apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 1m
  chart:
    spec:
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
      chart: cert-manager
      version: "v1.20.2"
      interval: 1m
  valuesFrom:
    - kind: Secret
      name: cert-manager-values
